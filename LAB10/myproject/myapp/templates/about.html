<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT12367 SPU - หน้าหลัก</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
        }

        /* Navbar */
        .navbar {
            background-color: #343a40;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .navbar-links {
            display: flex;
            gap: 25px;
        }
        .navbar-links a {
            color: #cccccc;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .navbar-links a:hover,
        .navbar-links a.active {
            color: #ffffff;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 350px;
            background: url('https://images.unsplash.com/photo-1509281373149-e957c6296406?w=1200&q=80') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        .hero h1 {
            position: relative;
            color: #ffffff;
            font-size: 32px;
            text-align: center;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Gallery Section */
        .gallery-section {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .gallery-section h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }
        .gallery-description {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .gallery-grid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 5px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery-grid img:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        .footer {
            background-color: #343a40;
            text-align: center;
            padding: 20px;
            color: #cccccc;
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="{% url 'index' %}" class="navbar-brand">ICT12367 SPU</a>
        <div class="navbar-links">
            <a href="{% url 'index' %}">หน้าแรก</a>
            <a href="{% url 'form' %}">ลงทะเบียน</a>
            <a href="{% url 'about' %}">เกี่ยวกับเรา</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h1>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <h2>ภาพกิจกรรม</h2>
        <p class="gallery-description">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Delectus, minus. Corpora odit at aliquam ex haetas e eveniet! Ratione, ducimus?
        </p>
        <div class="gallery-grid">
            <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400&q=80" alt="กิจกรรม 1">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80" alt="กิจกรรม 2">
            <img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=400&q=80" alt="กิจกรรม 3">
            <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=400&q=80" alt="กิจกรรม 4">
            <img src="https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=400&q=80" alt="กิจกรรม 5">
            <img src="https://images.unsplash.com/photo-1485808191679-5f86510681a2?w=400&q=80" alt="กิจกรรม 6">
            <img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=400&q=80" alt="กิจกรรม 7">
            <img src="https://images.unsplash.com/photo-1501747315-124a0eaca060?w=400&q=80" alt="กิจกรรม 8">
            <img src="https://images.unsplash.com/photo-1524350876685-274059332603?w=400&q=80" alt="กิจกรรม 9">
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        &copy; 2026 ICT12367 SPU | พุทธิพงษ์ สุวรรณวงศ์ 68118496
    </footer>
</body>
</html>
